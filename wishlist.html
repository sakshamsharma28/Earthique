<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Wishlist: Botanical Favorites – Earthique</title>
  <meta name="description" content="View the clean beauty items you've saved in your Earthique wishlist. Add them to your bag easily or continue browsing our herbal collection.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Announcement Bar & Header -->
  <div id="announcement-bar"></div>
  <header id="main-header" class="main-header"></header>

  <!-- ==========================================
       Wishlist Header
       ========================================== -->
  <div class="policy-page-header">
    <div class="container text-center">
      <span style="font-size:0.8rem; text-transform:uppercase; letter-spacing:2px; color:var(--color-sage-dark); font-weight:600;">Saved Radiance</span>
      <h1 style="font-family:var(--font-serif); margin-top:0.5rem; margin-bottom:1rem;">Your Wishlist</h1>
      <p style="max-width:600px; margin:0 auto;">Your private edit of premium botanicals saved for future routines.</p>
    </div>
  </div>

  <!-- ==========================================
       Wishlist Main Container
       ========================================== -->
  <div class="container section-padding" style="padding-top: 0; min-height: 50vh;">
    <div class="shop-products-grid" id="wishlist-page-view">
      <!-- Loaded dynamically from app.js -->
    </div>
  </div>

  <!-- Footer -->
  <footer id="main-footer" class="main-footer section-padding"></footer>

  <!-- Scripts -->
  <script src="products.js"></script>
  <script src="blogs.js"></script>
  <script src="components.js"></script>
  <script src="app.js"></script>
</body>
</html>
