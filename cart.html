<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart: Skincare Ritual Bag – Earthique</title>
  <meta name="description" content="View items in your Earthique skincare bag, apply discounts, select shipping preferences, and proceed to secure checkout.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Announcement Bar & Header -->
  <div id="announcement-bar"></div>
  <header id="main-header" class="main-header"></header>

  <!-- ==========================================
       Cart Page Header
       ========================================== -->
  <div class="policy-page-header">
    <div class="container text-center">
      <span style="font-size:0.8rem; text-transform:uppercase; letter-spacing:2px; color:var(--color-sage-dark); font-weight:600;">Your Bag</span>
      <h1 style="font-family:var(--font-serif); margin-top:0.5rem; margin-bottom:1rem;">Your Shopping Cart</h1>
      <p style="max-width:600px; margin:0 auto;">Review the select botanicals ready to join your daily skincare ritual.</p>
    </div>
  </div>

  <!-- ==========================================
       Cart Page Content Container
       ========================================== -->
  <main class="container section-padding" id="cart-page-view" style="padding-top:0; min-height: 55vh;">
    <!-- Rendered dynamically by app.js -->
  </main>

  <!-- Footer -->
  <footer id="main-footer" class="main-footer section-padding"></footer>

  <!-- Scripts -->
  <script src="products.js"></script>
  <script src="blogs.js"></script>
  <script src="components.js"></script>
  <script src="app.js"></script>
</body>
</html>
