<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account – Earthique Skincare</title>
  <meta name="description" content="Register an Earthique account to join Earthique Rewards. Track packages, save skincare favorites, and earn points on every order.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Announcement Bar & Header -->
  <div id="announcement-bar"></div>
  <header id="main-header" class="main-header"></header>

  <!-- ==========================================
       Register Main Card
       ========================================== -->
  <div class="container section-padding" style="margin-top: 60px; min-height: 60vh;">
    <div class="form-card">
      <h2 class="form-title" style="font-family:var(--font-serif); font-size:2.2rem;">Create Account</h2>
      <form onsubmit="handleRegisterSubmit(event)">
        <div class="form-group">
          <label for="reg-name" class="form-label">Full Name</label>
          <input type="text" id="reg-name" class="form-control" placeholder="Enter your full name" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="reg-email" class="form-label">Email Address</label>
          <input type="email" id="reg-email" class="form-control" placeholder="name@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="reg-pass" class="form-label">Password</label>
          <input type="password" id="reg-pass" class="form-control" placeholder="••••••••" required autocomplete="new-password">
        </div>
        <div class="form-group" style="margin-bottom:1.5rem">
          <label class="flex align-center" style="gap:0.8rem; cursor:pointer; font-size:0.8rem; font-weight:300;">
            <input type="checkbox" required style="accent-color:var(--color-sage)">
            <span>I agree to Earthique's <a href="terms.html" style="text-decoration:underline">Terms of Service</a> & <a href="privacy.html" style="text-decoration:underline">Privacy Policy</a></span>
          </label>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" style="width:100%; height:48px;">Register Account</button>
        </div>
      </form>
      <div class="form-footer">
        <span>Already have an account? <a href="login.html">Sign In</a></span>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer id="main-footer" class="main-footer section-padding"></footer>

  <!-- Scripts -->
  <script src="products.js"></script>
  <script src="blogs.js"></script>
  <script src="components.js"></script>
  <script src="app.js"></script>
</body>
</html>
