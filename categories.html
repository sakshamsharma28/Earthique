<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Categories – Earthique Skincare</title>
  <meta name="description" content="Discover Earthique's botanical skincare ranges. Shop by category including serums, face washes, cleansers, toners, hair care, and body essentials.">
  <meta name="keywords" content="organic beauty categories, natural serums, face wash range, herbal toner sprays, clean hair care">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

       ========================================== -->
  <div class="policy-page-header">

      <span style="font-size:0.8rem; text-transform:uppercase; letter-spacing:2px; color:var(--color-sage-dark); font-weight:600;">Custom Routines</span>

    <div class="concern-grid" id="categories-page-grid">

  <script src="products.js"></script>
