<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQ Journal: Clean Beauty Queries – Earthique</title>
  <meta name="description" content="Find answers to common questions about Earthique natural skincare products, eco-friendly glass packaging, dermatologist tests, and refund terms.">
  <meta name="keywords" content="organic cosmetics faq, clean beauty questions, paraben free safety, sulfate free shampoo help">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Announcement Bar & Header -->
  <div id="announcement-bar"></div>
  <header id="main-header" class="main-header"></header>

  <!-- ==========================================
       FAQ Header
       ========================================== -->
  <div class="policy-page-header">
    <div class="container text-center">
      <span style="font-size:0.8rem; text-transform:uppercase; letter-spacing:2px; color:var(--color-sage-dark); font-weight:600;">Information Center</span>
      <h1 style="font-family:var(--font-serif); margin-top:0.5rem; margin-bottom:1rem;">FAQ Journal</h1>
      <p style="max-width:600px; margin:0 auto;">Have queries about our organic ingredients, shipping speeds, or return procedures? Browse our comprehensive index.</p>
    </div>
  </div>

  <!-- ==========================================
       Search Bar and Accordions
       ========================================== -->
  <div class="container section-padding" style="padding-top:0; min-height:55vh;">
    <!-- Live Search Field -->
    <div class="faq-search-wrapper">
      <input type="text" placeholder="Search the FAQ journal..." class="faq-search-input" id="faq-search">
      <span class="faq-search-icon">🔍</span>
    </div>

    <!-- Accordion Grid -->
    <div class="faq-accordion-container" id="faq-page-accordion">
      <!-- Loaded dynamically from app.js -->
    </div>
  </div>

  <!-- Footer -->
  <footer id="main-footer" class="main-footer section-padding"></footer>

  <!-- Scripts -->
  <script src="products.js"></script>
  <script src="blogs.js"></script>
  <script src="components.js"></script>
  <script src="app.js"></script>
</body>
</html>
