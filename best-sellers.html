<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Best Sellers Skincare – Earthique</title>
  <meta name="description" content="Explore Earthique's top-performing natural skincare products, clinically recommended and loved by our community for ultimate radiance.">
  <meta name="keywords" content="Earthique best sellers, top natural skincare, herbal serum reviews, clean beauty favorites">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Announcement Bar & Header -->
  <div id="announcement-bar"></div>
  <header id="main-header" class="main-header"></header>

  <!-- ==========================================
       Best Sellers Header
       ========================================== -->
  <div class="policy-page-header">

      <span style="font-size:0.8rem; text-transform:uppercase; letter-spacing:2px; color:var(--color-sage-dark); font-weight:600;">Community Favorites</span>

  <!-- ==========================================
       Best Sellers Grid
       ========================================== -->
  <div class="container section-padding" style="padding-top: 0;">
    <div class="shop-products-grid" id="best-sellers-grid">
      <!-- Loaded dynamically from app.js -->
    </div>
  </div>

  <!-- Footer -->
  <footer id="main-footer" class="main-footer section-padding"></footer>

  <!-- Scripts -->
  <script src="products.js"></script>
  <script src="blogs.js"></script>
  <script src="components.js"></script>
