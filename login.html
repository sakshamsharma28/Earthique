<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Login – Earthique Skincare</title>
  <meta name="description" content="Sign in to your Earthique rewards account to view order history, track shipping updates, and claim private clean beauty deals.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Announcement Bar & Header -->
  <div id="announcement-bar"></div>
  <header id="main-header" class="main-header"></header>

  <!-- ==========================================
       Login Main Card
       ========================================== -->
  <div class="container section-padding" style="margin-top: 60px; min-height: 60vh;">
    <div class="form-card">
      <h2 class="form-title" style="font-family:var(--font-serif); font-size:2.2rem;">Sign In</h2>
      <form onsubmit="handleLoginSubmit(event)">
        <div class="form-group">
          <label for="login-email" class="form-label">Email Address</label>
          <input type="email" id="login-email" class="form-control" placeholder="name@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="login-pass" class="form-label">Password</label>
          <input type="password" id="login-pass" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <div class="flex justify-between align-center" style="font-size:0.8rem; margin-top:-0.5rem; margin-bottom:1.5rem">
          <label class="flex align-center" style="gap:0.5rem; cursor:pointer">
            <input type="checkbox" style="accent-color:var(--color-sage)"> Remember Me
          </label>
          <a href="#" style="color:var(--color-gray)">Forgot Password?</a>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" style="width:100%; height:48px;">Login to Account</button>
        </div>
      </form>
      <div class="form-footer">
        <span>New to Earthique? <a href="register.html">Create An Account</a></span>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer id="main-footer" class="main-footer section-padding"></footer>

  <!-- Scripts -->
  <script src="products.js"></script>
  <script src="blogs.js"></script>
  <script src="components.js"></script>
  <script src="app.js"></script>
</body>
</html>
